name: Claude Code Review (via Bedrock)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          # IMPORTANT
          aws-region: us-east-1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_USE_BEDROCK: "true"

          # Force exact Bedrock model
          ANTHROPIC_MODEL: "anthropic.claude-3-haiku-20240307-v1:0"

          # Disable prompt caching
          DISABLE_PROMPT_CACHING: "true"

        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

          prompt: |
            You are a senior Python developer reviewing a RAG chatbot project.

            Review the PR for:
            - Python bugs
            - LangChain issues
            - Security problems
            - Error handling
            - Streamlit-breaking changes

            Mention exact files and line numbers.

          claude_args: |
            --model anthropic.claude-3-haiku-20240307-v1:0
