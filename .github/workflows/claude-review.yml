name: Claude Code Review (via Bedrock)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full git history so Claude understands context

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          
          prompt: |
            You are reviewing a RAG chatbot PR request.
            
            Review the changes in this pull request and check for:
            1. Python bugs or logic errors
            2. LangChain / LLM integration issues
            3. Security issues (hardcoded API keys, exposed secrets, unsafe user inputs)

            Keep your review concise and actionable.
          claude_args: "--model global.anthropic.claude-sonnet-4-6"
