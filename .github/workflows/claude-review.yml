name: Claude Code Review (via Bedrock)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full git history so Claude understands context

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1   # Change this if your Bedrock is in a different region

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          allowed_tools: "Bash,Read,Write"
          additional_permissions: |
            - Bash(gh pr view:*)
            - Bash(gh pr diff:*)
            - Bash(gh pr comment:*)
            - Bash(gh api:*)
            - Bash(git diff:*)
            - Bash(git log:*)
          prompt: |
            You are a Python developer reviewing a RAG (Retrieval-Augmented Generation) chatbot project.
            The PR number for this review is: ${{ github.event.pull_request.number }}
            Repository: ${{ github.repository }}
            Run: gh pr view ${{ github.event.pull_request.number }} to get PR details
            Run: gh pr diff ${{ github.event.pull_request.number }} to get the diff
            Then post your review as a comment using: gh pr comment ${{ github.event.pull_request.number }} --body "your review"
                  
            Review the changes in this pull request and check for:
            1. Python bugs or logic errors
            2. LangChain / LLM integration issues
            3. Security issues (hardcoded API keys, exposed secrets, unsafe user inputs)
            4. Missing error handling or edge cases
            5. Anything that could break the Streamlit app

            Keep your review concise and actionable.
          claude_args: "--model global.anthropic.claude-sonnet-4-6"
