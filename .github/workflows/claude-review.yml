name: Claude Code Review (via Bedrock)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1  

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a senior Python developer reviewing a RAG (Retrieval-Augmented Generation) chatbot project.
            
            Review the changes in this pull request and check for:
            1. Python bugs or logic errors
            2. LangChain / LLM integration issues
            3. Security issues (hardcoded API keys, exposed secrets, unsafe user inputs)
            4. Code quality and readability
            5. Missing error handling or edge cases
            6. Anything that could break the Streamlit app
            
            Be specific — mention exact file names and line numbers.
            Keep your review concise and actionable.
          claude_args: "--model apac.anthropic.claude-3-haiku-20240307-v1:0"
